<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Sales Report Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #66bb6a, #c8e6c9);
        }

        .register-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.94);
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 14px 36px rgba(0,0,0,0.16);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .message {
            background: #fee2e2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 4px;
        }

        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .links a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="register-card">
    <h1>Register</h1>
    <div class="subtitle">Create a new dashboard account</div>

    <div th:if="${param.error}" class="message">
        Username already exists or registration failed.
    </div>

    <form method="post" action="/register">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Register</button>
    </form>

    <div class="links">
        Already have an account? <a href="/login">Back to Login</a>
    </div>
</div>
</body>
</html>
