<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sales Report Dashboard</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4caf50, #a5d6a7);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: rgba(255,255,255,0.94);
            padding: 36px;
            border-radius: 24px;
            box-shadow: 0 14px 36px rgba(0,0,0,0.16);
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #111827;
        }

        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .message {
            background: #f3f4f6;
            color: #374151;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 16px;
            font-size: 14px;
            text-align: center;
        }

        .error {
            background: #fee2e2;
            color: #b91c1c;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(90deg, #43a047, #66bb6a);
            color: white;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            margin-top: 4px;
        }

        button:hover {
            opacity: 0.95;
        }

        .links {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }

        .links a {
            color: #2e7d32;
            text-decoration: none;
            font-weight: bold;
        }

        .default-admin {
            margin-top: 18px;
            padding: 12px;
            border-radius: 12px;
            background: #ecfdf5;
            color: #166534;
            font-size: 14px;
            line-height: 1.5;
        }
    </style>
</head>
<body>
<div class="login-card">
    <h1>Login</h1>
    <div class="subtitle">Sales Report Dashboard Access</div>

    <div th:if="${param.error}" class="message error">
        Invalid username or password.
    </div>

    <div th:if="${param.registered}" class="message">
        Registration successful. Please log in.
    </div>

    <form method="post" action="/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        Don’t have an account? <a href="/register">Register</a>
    </div>

    <div class="default-admin">
        Default admin account:<br>
        username: <b>admin</b><br>
        password: <b>admin123</b>
    </div>
</div>
</body>
</html>
